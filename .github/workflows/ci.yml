name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The @contentbuilder/shared package is source-only (its main/types/exports
      # point at ./src/index.ts) and has no build step. The API and web app consume
      # it directly from source (next transpilePackages / vitest source alias), so
      # no shared build is required before typecheck.
      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build API
        run: npm run build --workspace apps/api

      - name: Build web
        run: npm run build --workspace apps/web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: http://localhost:4000
